{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="{% static 'apartment_dashboard/css/dashboard.css' %}">
</head>
<body>
<nav class="navbar">
    <ul>
        <li><a href="{% url 'apartment_dashboard:dashboard' %}">Dashboard</a></li>
        <li><a href="{% url 'apartment_dashboard:todo' %}">Todo</a></li>
        <li><a href="{% url 'apartment_dashboard:profile' %}">Profile</a></li>
        <li><a href="{% url 'apartment_dashboard:logout' %}">Logout</a></li>
    </ul>
</nav>

<main class="container">
    <h1>Welcome to Todo Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Total Todos</h3>
            <p class="number">{{ total }}</p>
        </div>
        <div class="card">
            <h3>Completed Todos</h3>
            <p class="number">{{ completed }}</p>
        </div>
        <div class="card">
            <h3>Pending Todos</h3>
            <p class="number">{{ pending }}</p>
        </div>
    </div>

    <a class="btn" href="{% url 'apartment_dashboard:todo' %}">View Todos</a>
</main>

</body>
</html>

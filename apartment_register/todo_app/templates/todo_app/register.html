{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{% static 'todo_app/style.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Create an Account</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_full_name">Full Name</label>
                <input type="text" id="id_full_name" name="full_name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" id="id_username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="id_email">Email</label>
                <input type="email" id="id_email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="id_password1">Password</label>
                <input type="password" id="id_password1" name="password1" placeholder="Enter a password" required>
            </div>
            <div class="form-group">
                <label for="id_password2">Confirm Password</label>
                <input type="password" id="id_password2" name="password2" placeholder="Confirm your password" required>
            </div>
            <button type="submit">Register</button>
        </form>
        <p class="link-text">
            <a href="{% url 'login' %}">Already have an account? Login</a>
        </p>
    </div>
</body>
</html>
